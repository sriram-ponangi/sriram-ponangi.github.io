      details:
      - "Designed and implemented a DevOps and release management strategy for deploying applications on OpenShift, aligned with client governance and release requirements. Defined GitHub branching strategy, application versioning model, and JFrog Artifactory repository structure."
      - "Defined an end-to-end DevOps strategy covering CI/CD pipeline design, configuration and secrets management, controlled code promotion across multiple testing teams and environments, and SQL change-log management using Liquibase."
      - "Created and maintained custom Helm charts integrating external secrets, certificate issuers, and automated certificate rotation, enforcing OpenShift security best practices (restricted-v2 SCCs, read-only root filesystems, etc.) and enabling dynamic reload of secrets and ConfigMaps."
      - "Standardized application observability by exposing internal actuator endpoints with restricted network policies, and implemented structured logging with trace IDs, span IDs, and MDC properties to support better traceability and debugging capabilities across microservices. "
      - "Designed and developed reusable Bash scripts used in CI/CD pipelines to deploy IBM FTM4C product's customization code, configuration artifacts, and environment-specific assets."
      - "Built automation for packaging and deploying both containerized applications on OpenShift and standalone applications on on-premise servers using Bash, Python, Maven Assembly, systemd unit files, Podman container files, and Helm charts."
      - "Created High-Level Designs (HLDs) and led the migration of a legacy cheque-processing system to a cloud-native OpenShift platform by refactoring and redesigning the codebase to improve scalability, performance, and maintainability, while ensuring seamless integration with other existing on-premise systems."
      - "Implemented enterprise-grade non-functional requirements, including mTLS using PKCS12 keystores / truststores, OAuth authentication (Client Credentials and Authorization Code flows), and externalized configuration with dynamic secret generation and rotation."
      - "Designed and implemented a future-date testing solution in OpenShift using a custom Java instrumentation agent to intercept JVM time APIs at runtime. Deployed the agent selectively in test environments, enabling future-date testing without modifying application code, configuration, or shared cluster infrastructure."

