      - "Designed and developed highly configurable, cloud-native applications for processing X937 files containing cheque images and metadata, focusing on scalability, resilience, and fault tolerance."
      - "Developed microservices for file tracking, alerting, insight visualization, and dashboard-driven updates to improve operational visibility and traceability."


