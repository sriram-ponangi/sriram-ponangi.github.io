projects:
- title: "Kubernetes GitOps Cluster Provisioing Automation"
  logoUrl: "/assets/img/projects/K8sGitOpsClusterProvisioing.png"
  technologiesUsed: |
    <ul>
      <li>
        Kubernetes / OpenShift, ArgoCD, GitHub, Helm, Kustomize, Cert-Manager, HashiCorp Vault, External Secrets Operator, 
        PostgreSQL, Apache Kafka, Stakater Reloader, Headlamp, other middleware & custom demo apps.
      </li>
    </ul>
  description: |
    <ul>
      <li>
        This project sets up an automated GitOps pipeline using ArgoCD to deploy and manage core infrastructure, security tools, 
        and shared services inside a Kubernetes / OpenShift cluster. Instead of manually applying manifests, the entire cluster state is 
        defined declaratively in a GitHub repository and synced automatically.
      </li>

      <li>
        The pipeline combines Helm and Kustomize to keep configurations modular, DRY, and reusable across environments. 
        The deployed stack provides baseline platform capabilities right out of the box: 
        <strong>HashiCorp Vault and External Secrets Operator</strong> for secure credential injection, 
        <strong>Cert-Manager</strong> for automated SSL/TLS certificates, 
        <strong>PostgreSQL and Apache Kafka</strong> for data and messaging layers, 
        <strong>Stakater Reloader</strong> for seamless rolling updates,
        <strong>Headlamp</strong> as a clean UI dashboard, etc. 
        The architecture is modularly structured, making it easy to onboard extra middleware or custom application workloads.
      </li>
    </ul>
  gitRepository: "https://github.com/Microservices-Demo-Projects/gitops-platform-bootstrap"


- title: "Serverless Expense Tracker App"
  logoUrl: "/assets/img/projects/ServerlessExpenseTrackerHLD.png"
  technologiesUsed: |
    <ul>
      <li>Angular, AWS Lambda (Node.js), Amazon API Gateway, Amazon Cognito, Amazon DynamoDB, Serverless Framework, GitHub Actions</li>
    </ul>
  description: |
    <ul>
      <li>
          A full-stack serverless application that lets users track personal expenses.
          The frontend is an <strong>Angular</strong> single-page application (SPA) hosted on GitHub Pages or an S3 bucket.
          The backend runs on <strong>AWS Lambda</strong> (Node.js) behind <strong>Amazon API Gateway</strong>, with authentication
          and authorization provided by <strong>Amazon Cognito</strong>. Expense data is persisted in <strong>Amazon DynamoDB</strong>.
      </li>

      <li>
        <strong>CI/CD</strong> The repository uses <strong>GitHub Actions</strong> to run unit tests, linting, and automatically deploy the
        Serverless backend (via the Serverless Framework) and the Angular frontend to GitHub Pages.
      </li>
    </ul>
  gitRepository: "https://github.com/sriram-ponangi/expense_tracker"

- title: "Distributed Log Tracing Using Jaeger"
  logoUrl: "/assets/img/projects/LogTracingProjectHLD.png"
  technologiesUsed: |
    <ul>
      <li>Spring boot, JUNIT, Maven, Kubernetes / Openshift (Service Mesh), Jaeger</li>
    </ul>
  description: |
    <ul>
      <li>This is a proof of concept project demonstrating logging of traceIds and spanIds across 
          SpringBoot microservices and integrating it with Jaeger for visualization and analysis. 
          All the applications are deployed using Docker and Kubernetes(Service Mesh).
      </li>
    </ul>
  gitRepository: "https://github.com/Microservices-Demo-Projects/logging-and-distributed-tracing"
