projects:
- title: "Distributed Log Tracing Using Jaeger"
  logoUrl: "/assets/img/projects/LogTracingProjectHLD.png"
  technologiesUsed: |
    <ul>
      <li>Spring boot, JUNIT, Maven, Kubernetes / Openshift (Service Mesh), Jaeger</li>
    </ul>
  description: |
    <ul>
      <li>This is a proof of concept project demonstrating logging of traceIds and spanIds across 
          SpringBoot microservices and integrating it with Jaeger for visualization and analysis. 
          All the applications are deployed using Docker and Kubernetes(Service Mesh).
      </li>
    </ul>
  gitRepository: "https://github.com/Microservices-Demo-Projects/logging-and-distributed-tracing"

- title: "Serverless Expense Tracker App"
  logoUrl: "/assets/img/projects/ServerlessExpenseTrackerHLD.png"
  technologiesUsed: |
    <ul>
      <li>Angular, AWS Lambda (Node.js), Amazon API Gateway, Amazon Cognito, Amazon DynamoDB, Serverless Framework, GitHub Actions</li>
    </ul>
  description: |
    <ul>
      <li>
          A full-stack serverless application that lets users track personal expenses.
          The frontend is an <strong>Angular</strong> single-page application (SPA) hosted on GitHub Pages or an S3 bucket.
          The backend runs on <strong>AWS Lambda</strong> (Node.js) behind <strong>Amazon API Gateway</strong>, with authentication
          and authorization provided by <strong>Amazon Cognito</strong>. Expense data is persisted in <strong>Amazon DynamoDB</strong>.
      </li>

      <li>
        <strong>CI/CD</strong> The repository uses <strong>GitHub Actions</strong> to run unit tests, linting, and automatically deploy the
        Serverless backend (via the Serverless Framework) and the Angular frontend to GitHub Pages.
      </li>
    </ul>
  gitRepository: "https://github.com/sriram-ponangi/expense_tracker"
